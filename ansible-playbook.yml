---
- name: "Build a container with ansible"
  hosts: localhost
  connection: local
  tasks:
    - name: build docker image using the Dockerfile
      command: docker build -t ahmedembaby24590/depi-image:depi-image .
      
  #  - name: Push the Docker image to Docker Hub
   #    command: docker push ahmedembaby24590/depi-image:depi-image

    - name: run container
      command: docker run -d --name web-container -p 5000:80 ahmedembaby24590/depi-image:depi-image
